<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AXON — Content Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#04060a;--panel:#0a121c;--cyan:#3df2ff;--pink:#ff5cf0;--amber:#ffb347;--ink:#e8f4ff;--dim:#6f8197;--line:rgba(61,242,255,.14)}
  *{margin:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);font-family:"Space Grotesk",system-ui,sans-serif;-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(61,242,255,.08),transparent 60%);padding:46px 22px 90px}
  .wrap{max-width:860px;margin:0 auto}
  .brand{display:flex;align-items:center;gap:10px;font-weight:600;letter-spacing:.24em;font-size:14px;margin-bottom:26px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 12px var(--cyan)}
  h1{font-size:clamp(30px,5vw,46px);font-weight:700;letter-spacing:-.02em;line-height:1.05}
  .sub{color:var(--dim);margin:14px 0 30px;font-size:16px;line-height:1.5;max-width:60ch}
  table{width:100%;border-collapse:collapse;border:1px solid var(--line)}
  th{text-align:left;font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.14em;color:var(--cyan);
    padding:14px;border-bottom:1px solid var(--line);background:var(--panel)}
  td{padding:15px 14px;border-bottom:1px solid rgba(61,242,255,.07);vertical-align:middle;line-height:1.45}
  tr:hover td{background:rgba(61,242,255,.03)}
  .day{font-family:"JetBrains Mono",monospace;color:var(--cyan);white-space:nowrap;font-weight:500}
  .content{font-weight:500;font-size:16px}
  .plat{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.04em;padding:4px 10px;border-radius:3px;white-space:nowrap;display:inline-block}
  .insta{color:var(--pink);border:1px solid rgba(255,92,240,.4)}
  .reels{color:var(--amber);border:1px solid rgba(255,179,71,.4)}
  .x{color:var(--ink);border:1px solid rgba(232,244,255,.3)}
  footer{margin-top:28px;color:var(--dim);font-size:13px;font-family:"JetBrains Mono",monospace}
  footer a{color:var(--cyan);text-decoration:none}
  @media(max-width:600px){td,th{padding:11px 9px}.content{font-size:14px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><span class="dot"></span>AXON</div>
  <h1>Content Calendar</h1>
  <p class="sub">Days 1–10 — building awareness through founder story, product, and concussion education.</p>
  <table>
    <thead><tr><th>Day</th><th>Content</th><th>Platform</th></tr></thead>
    <tbody id="rows"></tbody>
  </table>
  <footer>AXON · Concussion Detection — Hao Chang · <a href="mailto:haochang164@gmail.com">haochang164@gmail.com</a></footer>
</div>
<script>
const rows=[
 ["1","Founder story","insta","Instagram"],
 ["2","Product story","insta","Instagram"],
 ["3","Product explanation","insta","Instagram"],
 ["4","Achievements","reels","Reels"],
 ["5","5 concussion myths","reels","Reels"],
 ["6","Videos of me soldering at 17","reels","Reels"],
 ["7","Reintroduce product","x","X"],
 ["8","Make a clickbait video of my story","insta","Instagram"],
 ["9","Adding surveys, hype up","reels","Instagram Reels"],
 ["10","The 15-second sideline test that misses most concussions","reels","Reels"],
];
document.getElementById('rows').innerHTML=rows.map(r=>
  `<tr><td class="day">Day ${r[0]}</td><td class="content">${r[1]}</td><td><span class="plat ${r[2]}">${r[3]}</span></td></tr>`
).join('');
</script>
</body>
</html>
